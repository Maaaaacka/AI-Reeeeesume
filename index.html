<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>简历助手</title>
  <link rel="stylesheet" href="https://unpkg.com/vant@4/lib/index.css" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app"></div>

  <!-- 第三方库 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
  <script src="https://unpkg.com/vant@4/lib/vant.min.js"></script>
  
  <!-- 尝试加载 docx 库，如果失败则使用备用 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js"></script>
  <script>
    // 如果 docx 未加载，尝试备用 CDN
    if (typeof docx === 'undefined') {
      document.write('<script src="https://unpkg.com/docx@8.5.0/build/index.min.js"><\/script>');
    }
  </script>

  <!-- 自制色盘组件 -->
  <script src="js/color-wheel-picker.js"></script>
  <!-- 主应用 -->
  <script src="js/app.js"></script>
</body>
</html>
